<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turan AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

  <header>
    <img id="logo" src="assets/Turanb.png" alt="Turan AI Logo">
    <h1>Turan AI</h1>
    <div id="theme-switcher">
      <button id="light-btn">☀️</button>
      <button id="dark-btn">🌙</button>
    </div>
  </header>

  <main>
    <div id="chat-container">
      <div id="chat-box"></div>
      <div id="input-container">
        <input type="text" id="user-input" placeholder="Sorunuzu yazın...">
        <button id="send-btn">Gönder</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
